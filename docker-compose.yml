services:
  mongodb:
    image: mongo:7
    container_name: planning-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-planning_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-planning_password}
      MONGO_INITDB_DATABASE: planning
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
